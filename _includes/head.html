<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>{% if page.title %}{{ page.title }} | {% endif %}Natalia Szoppa</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=Mulish:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/line-awesome/1.3.0/line-awesome/css/line-awesome.min.css">

    <style>
        /* === 1. ZMIENNE KOLORYSTYCZNE I GEOMETRYCZNE === */
        :root {
            /* Główne kolory */
            --bg-color: #F9FAFB;
            --text-black: #111111;
            --text-gray: #444444; 
            --text-muted: #888888;
            --bg-muted: #f9f9fa;
            --border-color: #eaeaea;
            
            /* Akcenty i Gradienty firmowe */
            --gradient: linear-gradient(135deg, #7b2cbf, #f77f00);
            --accent-purple: #7b2cbf;
            --gold-pale: #f3e5f5; /* Używany do podświetleń błędów/korekt */
            
            /* Zmienne pomocnicze */
            --radius-lg: 16px;
            --radius: 8px;
            --shadow-soft: 0 10px 30px rgba(0,0,0,0.03);
            --shadow-med: 0 15px 40px rgba(0,0,0,0.06);
            --serif: 'Lora', serif;
            --sans: 'Mulish', sans-serif;
        }

        /* === 2. RESET I PODSTAWOWA TYPOGRAFIA === */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }
        body { 
            font-family: var(--sans); 
            color: var(--text-black); 
            background-color: var(--bg-color); 
            line-height: 1.6; 
            overflow-x: hidden; /* Zapobiega pojawianiu się dolnego paska przewijania */
        }
        
        /* Obsługa nagłówków - Lora */
        h1, h2, h3, h4, .lora-font { 
            font-family: var(--serif); 
            color: var(--text-black); 
        }
        
        /* Obsługa kursywy w nagłówkach (charakterystyczne pochylenie) */
        h1 i, h2 i, h3 i { 
            font-style: italic; 
            color: var(--text-black); 
            font-weight: 400; 
        }
        
        a { text-decoration: none; color: inherit; transition: all 0.3s ease; }

        /* === 3. CHARAKTERYSTYCZNE EFEKTY WIZUALNE === */
        
        /* Gradientowy tekst (np. w cenach lub wyróżnieniach) */
        .text-gradient {
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
        }

        /* Fioletowy marker pod tekstem (Używany głównie z tagiem <i> w nagłówkach) */
        .marker-highlight { 
            position: relative; 
            display: inline-block; 
            z-index: 1; 
            padding: 0 4px; 
        }
        .marker-highlight::before {
            content: ''; 
            position: absolute; 
            inset: 0 -4px; 
            z-index: -1; 
            border-radius: 3px 5px 3px 5px;
            --mark-color: 123 44 191; /* RGB dla #7b2cbf */
            --mark-bg-angle: 50deg;
            background: 
              conic-gradient(at 0 100%, rgb(var(--mark-color) / 35%) 1% , #fff0 3%) no-repeat 0 0 / auto 120%, 
              conic-gradient(from 180deg at 100% 0, #fff0, rgb(var(--mark-color) / 35%) 1%, #fff0 4%) no-repeat 100% 100% / auto 120%, 
              linear-gradient(var(--mark-bg-angle), rgb(var(--mark-color) / 25%), rgb(var(--mark-color) / 10%) 75%, rgb(var(--mark-color) / 20%)) no-repeat center / auto;
            rotate: -1deg; 
            transform: skew(-5deg); 
            scale: 1.05;
        }

        /* === 4. WSPÓLNE KOMPONENTY (Nav, Stopka, Przyciski) === */
        
        /* Uniwersalny kontener centrujący */
        .container { max-width: 1100px; margin: 0 auto; padding: 0 20px; }
        
        /* Główne przyciski */
        .btn-gradient {
            background: var(--gradient); color: white; padding: 12px 28px; border-radius: 30px;
            font-weight: 600; font-size: 14px; display: inline-block; border: none; cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .btn-gradient:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(123, 44, 191, 0.2); color: white; }
        
        .btn-outline {
            background: transparent; border: 2px solid var(--text-black); color: var(--text-black);
            padding: 10px 24px; border-radius: 30px; font-weight: 700; font-size: 13px; display: inline-block; 
            cursor: pointer; transition: all 0.3s; text-align: center;
        }
        .btn-outline:hover { background: var(--text-black); color: white; }

        /* Nawigacja Górna */
        .top-nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 30px 5%; max-width: 1400px; margin: 0 auto;
        }
        .nav-brand { font-family: var(--serif); font-size: 22px; font-weight: 600; }
        .nav-links { display: flex; gap: 30px; font-weight: 600; font-size: 15px; }
        .nav-links a:hover, .nav-links a.active { color: var(--accent-purple); }

        /* Pływające CTA w rogu */
        .floating-cta {
            position: fixed; bottom: 30px; right: 30px; z-index: 9999;
            background: var(--gradient); color: white;
            box-shadow: 0 10px 25px rgba(123, 44, 191, 0.3);
            display: flex; align-items: center; gap: 10px;
            padding: 15px 32px; font-size: 15px; font-weight: 600;
            border-radius: 50px; transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .floating-cta:hover { transform: translateY(-3px); box-shadow: 0 15px 35px rgba(123, 44, 191, 0.4); color: white; }

       /* === ZAKTUALIZOWANE MINIMALISTYCZNE STYLE STOPKI === */
        /* STOPKA */
    .site-footer { 
        text-align: center; 
        padding: 50px 20px; /* Zwiększyłem odrobinę padding, żeby szare tło miało czym oddychać */
        border-top: 1px solid var(--border-color); 
        margin-top: 60px; 
        font-size: 13px; 
        color: var(--text-muted); 
        background-color: var(--bg-muted); /* Magia! Lekki, elegancki szary odcień */
    }
        
        .footer-container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .footer-left {
            display: flex;
            flex-direction: column;
            gap: 10px;
            text-align: left;
        }
        
        .footer-brand {
            font-family: var(--serif);
            font-size: 18px;
            font-weight: 600;
            color: var(--text-black);
            letter-spacing: -0.2px;
        }
        
        .footer-brand i {
            font-style: italic;
            font-weight: 400;
            color: var(--text-black);
        }
        
        .footer-copy {
            font-size: 12px;
            color: var(--text-muted);
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        
        .footer-right {
            display: flex;
            align-items: center;
        }
        
        .footer-mail {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-black);
            display: flex;
            align-items: center;
            gap: 8px;
            transition: color 0.3s ease, transform 0.3s ease;
        }
        
        .footer-mail i {
            font-size: 18px;
            color: var(--accent-purple);
        }
        
        .footer-mail:hover {
            color: var(--accent-purple);
            transform: translateX(2px);
        }

        /* Responsywność dla urządzeń mobilnych */
        @media (max-width: 768px) {
            .footer-container {
                flex-direction: column;
                text-align: center;
                gap: 30px;
            }
            .footer-left {
                text-align: center;
                align-items: center;
            }
            .footer-right {
                justify-content: center;
            }
            .footer-mail:hover {
                transform: translateY(-1px); /* Na mobile lepiej delikatnie w górę zamiast w bok */
            }
        }

        /* Uniwersalne nagłówki sekcji */
        .section-header { text-align: center; margin-bottom: 50px; }
        .section-header.left { text-align: left; }
        .section-header h2 { font-size: 36px; margin-bottom: 15px; }
        .section-header p { font-size: 16px; color: var(--text-gray); max-width: 700px; margin: 0 auto; }
        .section-header.left p { margin: 0; }
        .section-subtitle { 
            font-family: var(--sans); color: var(--accent-purple); font-size: 12px; 
            letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px; 
            font-weight: 700; display: block; text-align: center; 
        }
        .section-header.left .section-subtitle { text-align: left; }

        /* === 5. MEDIA QUERIES (Globalna Responsywność) === */
        @media (max-width: 600px) {
            .nav-links { display: none; /* Ukrycie menu na mobile */ }
            .floating-cta { bottom: 20px; right: 20px; padding: 12px 24px; font-size: 14px; }
            .section-header h2 { font-size: 28px; }
        }
        /* Stylowanie przycisku mobile */
        .mobile-toggle { display: none; background: none; border: none; font-size: 28px; color: var(--text-black); cursor: pointer; }
        
        @media (max-width: 900px) {
            .nav-links { display: none; flex-direction: column; position: absolute; top: 80px; left: 0; right: 0; background: white; padding: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); z-index: 1000; text-align: center; }
            .nav-links.show-mobile { display: flex; } /* Ta klasa jest dodawana po kliknięciu w hamburgera */
            .mobile-toggle { display: block; }
        }
    </style>
</head>
