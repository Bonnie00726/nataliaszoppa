<link rel="stylesheet" href="https://maxst.icons8.com/vue-static/landings/line-awesome/line-awesome/1.3.0/css/line-awesome.min.css">

<style>
:root {
    --ink:        #161416;  
    --ink-soft:   #4a454a;
    --ink-muted:  #666666;
    --paper:      #ffffff;
    --paper-warm: #F4F5F7;  /* Nowy elegancki jasnoszary dla naprzemiennych sekcji */
    --paper-mid:  #EAE6E1;  
    
    /* Przygaszona paleta fiolet + pomarańcz */
    --color-primary:   #6C527A; /* Przygaszony fiolet */
    --color-secondary: #D48A5F; /* Przygaszony pomarańcz */
    --color-tertiary:  #A5697D; 

    --grad-start: var(--color-primary); 
    --grad-end:   var(--color-secondary);
    --grad-mid:   var(--color-primary);
    --grad:       linear-gradient(90deg, var(--grad-start), var(--grad-end));
    --grad-text:  linear-gradient(90deg, var(--grad-start), var(--grad-end));
    --green:      var(--color-secondary);
    --gold-pale:  #FBF9F6;
    --gold-light: var(--color-secondary);

    --shadow-soft: 0 4px 30px rgba(0, 0, 0, 0.03); 
    --shadow-med: 0 10px 40px rgba(0, 0, 0, 0.06); 
    --shadow-strong: 0 30px 60px rgba(0, 0, 0, 0.1); 
    
    --nav-h: 90px;
    --serif: 'Lora', serif;
    --sans: 'Mulish', sans-serif;
    --radius: 6px;
    --radius-sm: 6px;
    --radius-lg: 12px;
}

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: var(--sans); color: var(--ink); background: var(--paper); line-height: 1.75; overflow-x: hidden; }

    /* REVEAL */
    .js-loaded .reveal { opacity: 0; transform: translateY(32px); transition: opacity 0.8s cubic-bezier(0.22,1,0.36,1), transform 0.8s cubic-bezier(0.22,1,0.36,1); }
    .js-loaded .reveal.delay-1 { transition-delay: 0.1s; }
    .js-loaded .reveal.delay-2 { transition-delay: 0.2s; }
    .js-loaded .reveal.delay-3 { transition-delay: 0.3s; }
    .js-loaded .reveal.delay-4 { transition-delay: 0.4s; }
    .js-loaded .reveal.active  { opacity: 1; transform: none; }
    noscript .reveal { opacity: 1 !important; transform: none !important; }

    /* ZUNIFIKOWANA NAWIGACJA GLOBALNA GLOWNA (WYGLAD Z HERO) */
    .nav { position: fixed; top: 0; left: 0; width: 100%; z-index: 1000; height: var(--nav-h); background: #ffffff; display: flex; align-items: center; transition: box-shadow 0.3s ease, border-color 0.3s ease; border-bottom: 1px solid var(--paper-mid); }
    .nav.scrolled { box-shadow: var(--shadow-soft); }
    .nav-inner { width: 100%; max-width: 1000px; margin: 0 auto; padding: 0 20px; display: flex; align-items: center; justify-content: space-between; }
    .nav-logo { font-family: var(--serif); font-size: 24px; font-weight: 700; color: var(--ink); text-decoration: none; }
    .nav-logo em { font-style: italic; color: var(--color-primary); font-weight: inherit; display: inline; }
    .nav-links { display: flex; gap: 30px; align-items: center; list-style: none; margin: 0; padding: 0; }
    .nav-links a { text-decoration: none; color: var(--ink); font-family: var(--sans); font-size: 15px; font-weight: 600; transition: color 0.2s ease; }
    .nav-links a:hover { color: var(--color-primary); }
    .nav-cta { color: var(--ink) !important; font-weight: 700 !important; font-size: 15px !important; text-decoration: none !important; transition: color 0.2s ease; }
    .nav-cta:hover { color: var(--color-secondary) !important; }
    .nav-right { display: flex; align-items: center; gap: 12px; }
    .mobile-toggle { display: none; background: none; border: none; font-size: 1.8rem; color: var(--ink); cursor: pointer; padding: 4px; transition: color 0.2s; }
    .mobile-toggle:hover { color: var(--color-primary); }

    @media (max-width: 992px) {
        .nav-links { position: absolute; top: 100%; left: 0; right: 0; background: #ffffff; padding: 0; flex-direction: column; gap: 0; box-shadow: var(--shadow-med); border-top: 1px solid var(--paper-mid); max-height: 0; overflow: hidden; opacity: 0; transition: all 0.3s ease; display: flex; }
        .nav-links.nav-open { padding: 16px 0; max-height: 400px; opacity: 1; }
        .nav-links li { text-align: center; width: 100%; }
        .nav-links a { display: block; padding: 16px 40px; font-size: 15px; color: var(--ink); }
        .nav-links a:hover { color: var(--color-primary); background: rgba(0,0,0,0.02); }
        .nav-cta-item { width: 100%; }
        .mobile-toggle { display: block; }
    }

    /* HERO */
    .hero { position: relative; min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; text-align: center; }
    .hero--short { min-height: 73vh; }
    .hero-bg { position: absolute; inset: 0; z-index: 0; }
    .hero-bg img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .hero-bg::after { content: ''; position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(10,8,18,0.7) 0%, rgba(10,8,18,0.4) 100%); }
    .hero-bg::before { content: ''; position: absolute; inset: 0; z-index: 1; background: radial-gradient(ellipse at center, rgba(107,53,200,0.35) 0%, transparent 70%); }
    .hero-content { 
        position: relative; 
        z-index: 2; 
        padding: 0 40px 40px 40px;
        width: 100%; 
        max-width: 900px; 
        display: flex; 
        flex-direction: column; 
        align-items: center; 
        margin-top: var(--nav-h); 
    }

    .hero-notice { display: inline-flex; align-items: center; justify-content: center; gap: 14px; background: rgba(255,255,255,0.08); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); padding: 10px 24px; border-radius: 100px; border: 1px solid rgba(255,255,255,0.15); font-family: var(--sans); font-size: 0.85rem; color: #fff; margin-bottom: 36px; }
    .dots-wrap { display: flex; gap: 6px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; animation: pulse-dot 1.5s infinite ease-in-out; }
    .dot-1 { background: var(--color-primary); animation-delay: 0s; }
    .dot-2 { background: var(--grad-mid); animation-delay: 0.2s; }
    .dot-3 { background: var(--grad-end); animation-delay: 0.4s; }
    @keyframes pulse-dot { 0% { transform: scale(0.7); opacity: 0.4; } 50% { transform: scale(1.2); opacity: 1; } 100% { transform: scale(0.7); opacity: 0.4; } }

    .hero-eyebrow, .eyebrow { display: block; font-family: var(--sans); font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.2em; color: var(--color-secondary); margin-bottom: 18px; }
    .hero-eyebrow { margin-bottom: 24px; color: rgba(255,255,255,0.9); }
    .eyebrow { margin-bottom: 18px; }

    .hero h1 { font-family: var(--serif); font-size: clamp(3rem, 5vw, 5.5rem); color: #fff; line-height: 1.1; font-weight: 700; margin-bottom: 28px; }
    .hero h1 em { font-style: italic; color: #fff; font-weight: 400; padding: 0; }
    .hero h1 em.grad-type { font-style: italic; font-weight: 700; background: var(--color-primary); -webkit- background-clip: text; display: inline-block; padding-right: 8px; padding-bottom: 15px; margin-bottom: -15px; }
    .cursor { display: inline-block; width: 3px; height: 1em; background-color: #FFFFFF; vertical-align: middle; margin-left: 5px; animation: blink 1s step-end infinite; }
    @keyframes blink { 50% { opacity: 0; } }
    .hero-sub { font-family: var(--sans); color: rgba(255,255,255,0.75); font-size: 1.1rem; font-weight: 300; max-width: 650px; margin: 0 auto; line-height: 1.8; }

    /* LAYOUT NAPRZEMIENNYCH SEKCJI */
    .container { max-width: 1180px; margin: 0 auto; padding: 0 40px; }
    .section { padding: 110px 0; }
    .section:nth-of-type(odd) { background: var(--paper); }
    .section:nth-of-type(even) { background: var(--paper-warm); }
    
    .section-h2 { font-family: var(--serif); font-size: clamp(2rem, 3vw, 2.8rem); font-weight: 700; line-height: 1.2; color: var(--ink); margin-bottom: 20px; letter-spacing: -0.02em; }
    .section-h2 em { font-style: italic; color: var(--color-primary); padding: 0; font-weight: 400; display: inline-block; background: none; -webkit-text-fill-color: initial; }

    /* O MNIE */
    .about-grid { display: grid; grid-template-columns: 1fr 1.15fr; gap: 80px; align-items: start; }
    .about-img-wrap { position: relative; padding-bottom: 28px; padding-right: 28px; }
    .about-img-wrap img { width: 100%; aspect-ratio: 4/5; object-fit: cover; border-radius: var(--radius); display: block; }
    .about-img-caption { position: absolute; bottom: 0; right: 0; background: var(--color-primary); color: #fff; padding: 18px 22px; border-radius: var(--radius); font-family: var(--serif); font-size: 0.85rem; font-weight: 600; max-width: 180px; line-height: 1.4; box-shadow: var(--shadow-med); }
    .about-text p { font-family: var(--sans); color: var(--ink-soft); font-size: 1.0rem; margin-bottom: 20px; font-weight: 300; }

    /* USŁUGI */
    .services-intro { margin-bottom: 60px; }
    .services-desc { font-family: var(--sans); font-size: 1.05rem; color: var(--ink-soft); font-weight: 300; margin-top: 10px; max-width: 600px; }
    .services-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
    @media (min-width: 900px) {
        .services-grid { grid-template-columns: repeat(3, 1fr); }
    }
    .service-card { background: #fff; border: 1px solid var(--paper-mid); border-radius: var(--radius-lg); padding: 40px 32px; transition: transform 0.3s, box-shadow 0.3s, border-color 0.3s; position: relative; overflow: hidden; box-shadow: var(--shadow-soft); }
    .service-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-med); border-color: var(--color-primary); }
    .service-icon { width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; background: var(--paper-warm); border-radius: var(--radius-sm); margin-bottom: 24px; border: 1px solid var(--paper-mid); transition: border-color 0.3s; }
    .service-icon i { font-size: 1.5rem; color: var(--color-primary); }
    .service-card h3 { font-family: var(--serif); font-size: 1.25rem; font-weight: 600; color: var(--ink); margin-bottom: 12px; }
    .service-card p { font-family: var(--sans); font-size: 0.92rem; color: var(--ink-muted); line-height: 1.65; }

    /* MISJA */
    .mission-wrap { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 80px; align-items: start; }
    .mission-aside { position: sticky; top: calc(var(--nav-h) + 40px); }
    .mission-text p { font-family: var(--sans); font-size: 1.05rem; color: var(--ink-soft); margin-bottom: 24px; font-weight: 300; }
    .blockquote { border-left: 3px solid var(--color-primary); padding: 24px 32px; background: #fff; border-radius: 0 var(--radius) var(--radius) 0; margin: 36px 0; border: 1px solid var(--paper-mid); border-left: 4px solid var(--color-primary); }
    .blockquote p { font-family: var(--serif); font-size: 1.2rem; font-style: italic; color: var(--ink); line-height: 1.6; margin: 0 !important; }
    .mission-aside-card { background: var(--ink); color: #fff; padding: 36px; border-radius: var(--radius-lg); display: flex; flex-direction: column; align-items: center; text-align: center; }
    .mission-aside-card h4 { font-family: var(--serif); font-size: 1.3rem; font-weight: 600; margin-bottom: 16px; color: var(--color-secondary); padding-bottom: 3px; display: inline-block; }
    .mission-aside-card p { font-family: var(--sans); font-size: 0.9rem; color: rgba(255,255,255,0.75); margin-bottom: 24px; line-height: 1.65; }
    .btn-primary { display: inline-flex; align-items: center; gap: 10px; background: var(--color-primary); color: #fff; font-family: var(--sans); font-size: 0.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; text-decoration: none; padding: 12px 28px; border-radius: var(--radius-sm); transition: all 0.3s; border: 1px solid var(--color-primary); box-shadow: 0 4px 15px rgba(108, 82, 122, 0.2); }
    .btn-primary:hover { background: var(--color-secondary); border-color: var(--color-secondary); transform: translateY(-2px); box-shadow: 0 6px 20px rgba(212, 138, 95, 0.3); color: #fff; }

    /* OPINIE */
    .reviews-desc { font-family: var(--sans); font-size: 1.05rem; color: var(--ink-soft); font-weight: 300; margin-top: 16px; margin-bottom: 48px; max-width: 900px; line-height: 1.7; }
    .reviews-desc p { margin-bottom: 10px; }
    .reviews-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
    .review-card { background: #fff; padding: 36px 30px; border-radius: var(--radius-lg); border: 1px solid var(--paper-mid); box-shadow: var(--shadow-soft); display: flex; flex-direction: column; gap: 20px; transition: transform 0.3s, box-shadow 0.3s, border-color 0.3s; }
    .review-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-med); border-color: var(--color-primary); }
    .review-stars { display: flex; gap: 3px; }
    .review-stars i { font-size: 0.9rem; color: var(--color-secondary); }
    .review-text { font-family: var(--serif); font-size: 1.0rem; font-style: italic; color: var(--ink-soft); line-height: 1.65; flex: 1; }
    .review-author { display: flex; align-items: center; gap: 12px; padding-top: 20px; border-top: 1px solid var(--paper-mid); }
    .review-avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--color-primary); display: flex; align-items: center; justify-content: center; font-family: var(--serif); font-size: 1rem; font-weight: 700; color: #fff; flex-shrink: 0; }
    .review-name { font-family: var(--sans); font-size: 0.88rem; font-weight: 600; color: var(--ink); }
    .review-role { font-family: var(--sans); font-size: 0.78rem; color: var(--ink-muted); }

    /* PROCES */
    .steps { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0; position: relative; }
    .steps::before { content: ''; position: absolute; top: 44px; left: 10%; right: 10%; height: 1px; background: var(--paper-mid); z-index: 0; }
    .step { display: flex; flex-direction: column; align-items: center; text-align: center; padding: 0 24px; position: relative; z-index: 1; }
    .step-num { width: 56px; height: 56px; border-radius: var(--radius-sm); background: #fff; display: flex; align-items: center; justify-content: center; font-family: var(--serif); font-size: 1.4rem; font-style: italic; font-weight: 700; margin-bottom: 24px; box-shadow: var(--shadow-soft); position: relative; transition: background 0.3s, color 0.3s, border-color 0.3s; border: 1px solid var(--paper-mid); }
    .step-num span { color: var(--color-primary); }
    .step:hover .step-num { background: var(--color-primary); border-color: var(--color-primary); }
    .step:hover .step-num span { color: #fff; }
    .step-name { font-family: var(--serif); font-size: 1.1rem; font-weight: 600; color: var(--ink); margin-bottom: 10px; }
    .step-desc { font-family: var(--sans); font-size: 0.88rem; color: var(--ink-muted); line-height: 1.6; }

    /* SLIDER */
    .slider-wrap { overflow: hidden; margin-top: 56px; }
    .slider-track { display: flex; gap: 20px; animation: slide 50s linear infinite; width: max-content; }
    .slider-wrap:hover .slider-track { animation-play-state: paused; }
    .slide-card { width: 280px; height: 360px; border-radius: var(--radius-lg); overflow: hidden; position: relative; flex-shrink: 0; background-size: cover; background-position: center; transition: transform 0.4s; }
    .slide-card:hover { transform: scale(1.02); }
    .slide-card::before { content: ''; position: absolute; inset: 0; background: linear-gradient(0deg, rgba(10,10,18,0.85) 0%, transparent 55%); }
    .slide-card span { position: absolute; bottom: 24px; left: 24px; font-family: var(--serif); font-size: 1.1rem; font-weight: 600; color: #fff; z-index: 1; }
    .slide-card em { position: absolute; top: 20px; right: 20px; background: var(--color-primary); color: #fff; font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; padding: 4px 10px; border-radius: 2px; font-style: normal; z-index: 1; }
    @keyframes slide { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

    /* KAFELKI */
    .tiles-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
    .tile { display: flex; flex-direction: column; align-items: flex-start; padding: 44px 36px; border-radius: var(--radius-lg); text-decoration: none; transition: transform 0.3s, box-shadow 0.3s, border-color 0.3s; border: 1px solid var(--paper-mid); background: #fff; box-shadow: var(--shadow-soft); }
    .tile:hover { transform: translateY(-4px); box-shadow: var(--shadow-med); border-color: var(--color-primary); }
    .tile i { font-size: 2rem; margin-bottom: 24px; color: var(--color-primary); }
    .tile h3 { font-family: var(--serif); font-size: 1.4rem; font-weight: 600; margin-bottom: 10px; color: var(--ink); }
    .tile p { font-family: var(--sans); font-size: 0.9rem; line-height: 1.6; color: var(--ink-muted); }
    .tile-arrow { margin-top: auto; padding-top: 28px; font-size: 1.3rem; transition: transform 0.3s; color: var(--color-primary); }
    .tile:hover .tile-arrow { transform: translateX(4px); color: var(--color-secondary); }

    /* PRZED I PO */
    .comparison-container { display: flex; gap: 24px; margin-top: 40px; }
    @media (max-width: 768px) { .comparison-container { flex-direction: column; } }
    .comparison-box { flex: 1; border-radius: var(--radius-lg); padding: 36px 32px; box-shadow: var(--shadow-soft); position: relative; border: 1px solid var(--paper-mid); background: #fff; }
    .comparison-box.before { background-color: #FAFAFA; border-color: #EFEFEF; }
    .comparison-box.after { background-color: #ffffff; border-left: 4px solid var(--color-primary); box-shadow: var(--shadow-med); overflow: hidden; border-top: 1px solid var(--paper-mid); border-right: 1px solid var(--paper-mid); border-bottom: 1px solid var(--paper-mid); }
    .box-header { font-family: var(--sans); font-size: 0.85rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
    .comparison-box.before .box-header { color: #E53E3E; }
    .comparison-box.after .box-header { color: var(--color-primary); }
    .box-content { font-family: var(--sans); font-size: 1.05rem; font-weight: 300; line-height: 1.8; color: var(--ink-soft); }
    .highlight-red { background-color: #FEE2E2; color: #991B1B; padding: 2px 6px; border-radius: var(--radius); }
    .highlight-purple { background-color: var(--paper-warm); color: var(--color-primary); padding: 2px 6px; border-radius: var(--radius); font-weight: 500; }
    .box-tags { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 28px; padding-top: 24px; border-top: 1px dashed var(--paper-mid); }
    .box-tags span { font-family: var(--sans); font-size: 0.75rem; font-weight: 600; padding: 6px 14px; border-radius: 100px; }
    .comparison-box.before .box-tags span { background: #FFF5F5; color: #C53030; border: 1px solid #FEE2E2; }
    .comparison-box.after .box-tags span { background: var(--paper-warm); color: var(--color-primary); border: 1px solid var(--paper-mid); }

    /* CTA */
    .cta-strip { background: var(--ink); border-radius: var(--radius-lg); padding: 56px 64px; display: flex; align-items: center; justify-content: space-between; gap: 40px; position: relative; overflow: hidden; box-shadow: var(--shadow-strong); margin: 60px auto; max-width: 100%; }
    .cta-strip::before { content: ''; position: absolute; top: 0; left: 0; bottom: 0; width: 6px; background: var(--color-primary); }
    .cta-text { flex: 1; }
    .cta-text h2 { font-family: var(--serif); font-size: clamp(1.8rem, 3vw, 2.4rem); color: #ffffff; margin-bottom: 16px; line-height: 1.2; }
    .cta-text p { font-family: var(--sans); color: rgba(255, 255, 255, 0.75); font-size: 1.05rem; font-weight: 300; max-width: 650px; line-height: 1.6; }

    /* STOPKA */
    footer { background: #0D0D0D; color: #fff; padding: 56px 0 32px; }
    .footer-container { max-width: 1180px; margin: 0 auto; padding: 0 40px; }
    .footer-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 60px; padding-bottom: 40px; border-bottom: 1px solid rgba(255,255,255,0.08); margin-bottom: 28px; }
    .footer-left { display: flex; flex-direction: column; }
    .footer-right { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; }
    .footer-logo { font-family: var(--serif); font-size: 1.4rem; font-weight: 700; margin-bottom: 14px; }
    .footer-desc { font-family: var(--sans); font-size: 0.88rem; color: rgba(255,255,255,0.5); line-height: 1.7; margin-bottom: 24px; }
    .footer-socials { display: flex; gap: 10px; }
    .footer-socials a { width: 36px; height: 36px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.15); display: flex; align-items: center; justify-content: center; color: rgba(255,255,255,0.5); text-decoration: none; font-size: 1rem; transition: all 0.2s; }
    .footer-socials a:hover { background: var(--color-primary); color: #fff; border-color: transparent; }
    .footer-col h4 { font-family: var(--sans); font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.15em; margin-bottom: 16px; color: rgba(255,255,255,0.9); }
    .footer-links { list-style: none; padding: 0; margin: 0; }
    .footer-links li { margin-bottom: 10px; }
    .footer-links a { font-family: var(--sans); color: rgba(255,255,255,0.5); text-decoration: none; font-size: 0.88rem; transition: color 0.2s; }
    .footer-links a:hover { color: #fff; }
