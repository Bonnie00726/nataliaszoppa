<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, minimum-scale=1.0">
<meta http-equiv="X-UA-Compatible" content="IE=edge">

<title>{% if page.title %}{{ page.title }} | {% endif %}Natalia Szoppa</title>

<meta property="og:title" content="{% if page.title %}{{ page.title }} | {% endif %}Natalia Szoppa">
<meta property="og:site_name" content="Natalia Szoppa">
<meta property="og:type" content="website">
<meta name="apple-mobile-web-app-title" content="Natalia Szoppa">

<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Mulish:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://maxst.icons8.com/vue-static/landings/line-awesome/line-awesome/1.3.0/css/line-awesome.min.css">

<style>
    :root {
        --ink:        #0D0D0D;
        --ink-soft:   #333333;
        --ink-muted:  #666666;
        --paper:      #FFFFFF;
        --paper-warm: #F7F7F7;
        --paper-mid:  #E5E5E5;
        --grad-start: #6B35C8;
        --grad-mid:   #B8409A; 
        --grad-end:   #E8772A;
        --grad:       linear-gradient(135deg, var(--grad-start) 0%, var(--grad-end) 100%);
        --grad-text:  linear-gradient(135deg, var(--grad-start) 0%, var(--grad-end) 100%);
        
        --shadow-soft:   0 4px 24px rgba(13,13,13,0.06);
        --shadow-med:    0 8px 40px rgba(13,13,13,0.10);
        --shadow-strong: 0 30px 60px rgba(13,13,13,0.20);
        --shadow-faq:    0 2px 8px rgba(107, 53, 200, 0.04);
        --nav-h: 76px;
        --serif: 'Lora', Georgia, serif;
        --sans:  'Mulish', sans-serif;
        --radius:    4px;
        --radius-lg: 12px;
        --gold-pale:  #F5F0FF;
        --green:      #6B35C8;
        --gold-light: #E8772A;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: var(--sans); color: var(--ink); background: var(--paper); line-height: 1.75; overflow-x: hidden; }

    .js-loaded .reveal { opacity: 0; transform: translateY(32px); transition: opacity 0.8s cubic-bezier(0.22,1,0.36,1), transform 0.8s cubic-bezier(0.22,1,0.36,1); }
    .js-loaded .reveal.delay-1 { transition-delay: 0.1s; }
    .js-loaded .reveal.delay-2 { transition-delay: 0.2s; }
    .js-loaded .reveal.delay-3 { transition-delay: 0.3s; }
    .js-loaded .reveal.delay-4 { transition-delay: 0.4s; }
    .js-loaded .reveal.active  { opacity: 1; transform: none; }
    noscript .reveal { opacity: 1 !important; transform: none !important; }

    .nav { position: fixed; top: 0; left: 0; width: 100%; z-index: 1000; height: var(--nav-h); background: transparent; border-bottom: none; display: flex; align-items: center; transition: background 0.3s ease, backdrop-filter 0.3s ease; }
    .nav.scrolled { background: rgba(13,13,13,0.92); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); }
    
    .nav-inner { width: 100%; max-width: 1180px; margin: 0 auto; padding: 0 40px; display: flex; align-items: center; justify-content: space-between; }
    
    .nav-logo { font-family: var(--serif); font-size: 1.35rem; font-weight: 700; color: #fff; text-decoration: none; display: flex; align-items: baseline; gap: 0.2em; position: relative; z-index: 902; }
    .nav-logo em { font-style: italic; color: var(--grad-start); font-weight: inherit; }
    
    .nav-links { display: flex; gap: 32px; list-style: none; }
    .nav-links a { font-family: var(--sans); font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.12em; color: rgba(255,255,255,0.75); text-decoration: none; transition: color 0.2s; }
    .nav-links a:hover, .nav-links a.active { color: #fff; }
    .nav-right { display: flex; align-items: center; gap: 12px; position: relative; z-index: 902; }
    .nav-cta { font-family: var(--sans); font-size: 0.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: #fff; background: var(--grad); text-decoration: none; padding: 10px 22px; border-radius: 100px; transition: opacity 0.2s, transform 0.2s; }
    .nav-cta:hover { opacity: 0.85; transform: translateY(-1px); }

    .mobile-toggle { display: none; background: none; border: none; font-size: 1.8rem; color: #fff; cursor: pointer; padding: 4px; transition: color 0.2s; }
    .mobile-toggle:hover { color: var(--grad-start); }

    .hero-eyebrow, .eyebrow { 
        display: block; 
        font-family: var(--sans); font-size: 0.75rem; font-weight: 700; 
        text-transform: uppercase; letter-spacing: 0.18em; 
        color: var(--grad-start);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
    }
    .hero-eyebrow { margin-bottom: 24px; color: rgba(255,255,255,0.9); }
    .eyebrow { margin-bottom: 18px; }

    .hero h1 { font-family: var(--serif); font-size: clamp(3rem, 5vw, 5.5rem); color: #fff; line-height: 1.1; font-weight: 700; margin-bottom: 28px; }
    .hero h1 em { font-style: italic; color: #fff; font-weight: 400; padding: 0; }
    .grad-type {
        font-style: italic; font-weight: 700;
        background: var(--grad-text);
        -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        background-clip: text; display: inline-block;
        padding-right: 8px; padding-bottom: 15px; margin-bottom: -15px; 
    }
    
    .cursor { display: inline-block; width: 3px; height: 1em; background-color: #FFFFFF; vertical-align: middle; margin-left: 5px; animation: blink 1s step-end infinite; }
    @keyframes blink { 50% { opacity: 0; } }

    .hero-sub { font-family: var(--sans); color: rgba(255,255,255,0.75); font-size: 1.1rem; font-weight: 300; max-width: 650px; margin: 0 auto; line-height: 1.8; }

    .container { max-width: 1180px; margin: 0 auto; padding: 0 40px; }
    .container--wide { max-width: 1180px; margin: 0 auto; padding: 0 40px; }
    .section { padding: 110px 0; }

    .section-h2 { font-family: var(--serif); font-size: clamp(2rem, 3vw, 2.8rem); font-weight: 700; line-height: 1.2; color: var(--ink); margin-bottom: 20px; }
    .section-h2 em { font-style: italic; background: var(--grad-text); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; padding: 3px 4px 3px 6px; display: inline-block; }
    .section-lead { font-size: 1.05rem; color: var(--ink-muted); font-weight: 300; max-width: 560px; line-height: 1.75; margin-bottom: 60px; }
    .sub-section-title { font-family: var(--serif); font-size: clamp(1.6rem, 2.2vw, 2rem); font-weight: 700; color: var(--ink); margin: 80px 0 32px; text-align: center; }

    .text-content p { font-size: 1.05rem; font-weight: 300; color: var(--ink-soft); margin-bottom: 20px; line-height: 1.75; }
    .text-content p strong { font-weight: 700; color: var(--ink); }

    /* ── CTA SECTION ── */
    .cta-section {
        padding: 120px 40px;
        text-align: center; position: relative; overflow: hidden;
        background-image: url('https://images.unsplash.com/photo-1586806974856-c55e8b9364e4?q=80&w=1170&auto=format&fit=crop');
        background-size: cover;
        background-position: center;
    }
    .cta-section::before {
        content: ''; position: absolute; inset: 0;
        background: linear-gradient(135deg, rgba(107, 53, 200, 0.9) 0%, rgba(184, 64, 154, 0.9) 50%, rgba(232, 119, 42, 0.9) 100%);
        z-index: 1;
    }
    .cta-content { position: relative; z-index: 2; }
    .cta-section .eyebrow { color: rgba(255,255,255,0.8); }
    .cta-section h2 { font-family: var(--serif); font-size: clamp(2rem, 3.5vw, 3rem); color: #fff; font-weight: 700; margin-bottom: 16px; }
    .cta-section p { color: rgba(255,255,255,0.9); font-weight: 300; font-size: 1.05rem; max-width: 520px; margin: 0 auto 40px; line-height: 1.6;}
    .cta-btns { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
    .btn-primary { display: inline-flex; align-items: center; gap: 10px; background: #fff; color: var(--ink); font-size: 0.85rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; text-decoration: none; padding: 15px 32px; border-radius: 100px; transition: transform 0.2s, box-shadow 0.2s; }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(0,0,0,0.2); }
    .btn-ghost { display: inline-flex; align-items: center; gap: 8px; color: #fff; font-size: 0.85rem; font-weight: 600; text-decoration: none; padding: 14px 28px; border: 1.5px solid rgba(255,255,255,0.4); border-radius: 100px; transition: background 0.2s, border-color 0.2s; background: transparent; }
    .btn-ghost:hover { background: rgba(255,255,255,0.1); border-color: #fff; }

    .grad-line-footer { height: 3px; background: var(--grad); }
    
    /* ── FOOTER ── */
    footer { background: #0D0D0D; color: #fff; padding: 56px 0 32px; }
    .footer-container { max-width: 1180px; margin: 0 auto; padding: 0 40px; width: 100%; }
    .footer-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 60px; padding-bottom: 40px; border-bottom: 1px solid rgba(255,255,255,0.08); margin-bottom: 28px; }
    .footer-left { display: flex; flex-direction: column; }
    .footer-right { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; }
    .footer-logo { font-family: var(--serif); font-size: 1.4rem; font-weight: 700; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .footer-logo .footer-grad { background: var(--grad-text); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; display: inline-block; font-style: normal; }
    .footer-desc { font-family: var(--sans); font-size: 0.88rem; color: rgba(255,255,255,0.5); line-height: 1.7; margin-bottom: 24px; }
    .footer-socials { display: flex; gap: 10px; }
    .footer-socials a { width: 36px; height: 36px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.15); display: flex; align-items: center; justify-content: center; color: rgba(255,255,255,0.5); text-decoration: none; font-size: 1rem; transition: all 0.2s; }
    .footer-socials a:hover { background: var(--grad); color: #fff; border-color: transparent; }
    .footer-col h4 { font-family: var(--sans); font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.15em; margin-bottom: 16px; color: rgba(255,255,255,0.9); }
    .footer-links { list-style: none; padding: 0; margin: 0; }
    .footer-links li { margin-bottom: 10px; }
    .footer-links a { font-family: var(--sans); color: rgba(255,255,255,0.5); text-decoration: none; font-size: 0.88rem; transition: color 0.2s; }
    .footer-links a:hover { color: #fff; }
    .footer-bottom { display: flex; justify-content: space-between; font-family: var(--sans); font-size: 0.78rem; color: rgba(255,255,255,0.25); align-items: center; }

    @media (max-width: 860px) {
        :root { --nav-h: 64px; }
        .hero-content { padding: 0 24px; }
        .mobile-toggle { display: block; }
        .nav-cta { display: none; }
        .nav-right { display: flex; }
        .nav-links { 
            position: absolute; top: 100%; left: 0; right: 0; 
            background: rgba(13,13,13,0.98); padding: 0; 
            flex-direction: column; gap: 0;
            box-shadow: var(--shadow-med); border-top: 1px solid rgba(255,255,255,0.1);
            max-height: 0; overflow: hidden; opacity: 0; transition: all 0.3s ease;
            display: flex;
        }
        .nav-links.nav-open { padding: 16px 0; max-height: 400px; opacity: 1; }
        .nav-links li { text-align: center; width: 100%; }
        .nav-links a { display: block; padding: 16px 40px; font-size: 0.95rem; color: #fff; }
        
        .container { padding: 0 20px; }
        .section { padding: 72px 0; }
        
        .footer-grid { grid-template-columns: 1fr; }
        .footer-right { grid-template-columns: 1fr 1fr; }
        .footer-bottom { flex-direction: column; gap: 12px; align-items: flex-start; text-align: left; }

        .js-loaded .reveal { opacity: 1 !important; transform: none !important; transition: none !important; }
    }
    @media (max-width: 600px) { 
        .nav-logo, .footer-logo { flex-direction: row; align-items: center; text-align: left; gap: 6px; }
        .nav-logo em { display: inline; }
        .footer-logo .sep { display: inline-block; }
        .footer-logo { justify-content: flex-start; }
    }
</style>
