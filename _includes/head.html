<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, minimum-scale=1.0">
<meta http-equiv="X-UA-Compatible" content="IE=edge">

<title>{% if page.title %}{{ page.title }} | {% endif %}Natalia Szoppa</title>

<meta property="og:title" content="{% if page.title %}{{ page.title }} | {% endif %}Natalia Szoppa">
<meta property="og:site_name" content="Natalia Szoppa">
<meta property="og:type" content="website">
<meta name="apple-mobile-web-app-title" content="Natalia Szoppa">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Mulish:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://maxst.icons8.com/vue-static/landings/line-awesome/line-awesome/1.3.0/css/line-awesome.min.css">

<style>
    :root {
        --ink:        #0D0D0D;
        --ink-soft:   #333333;
        --ink-muted:  #666666;
        --paper:      #FFFFFF;
        --paper-warm: #F7F7F7;
        --paper-mid:  #E5E5E5;
        --grad-start: #6B35C8;
        --grad-mid:   #B8409A; 
        --grad-end:   #E8772A;
        --grad:       linear-gradient(135deg, var(--grad-start) 0%, var(--grad-end) 100%);
        --grad-text:  linear-gradient(135deg, var(--grad-start) 0%, var(--grad-end) 100%);
        
        --shadow-soft:   0 4px 24px rgba(13,13,13,0.06);
        --shadow-med:    0 8px 40px rgba(13,13,13,0.10);
        --shadow-strong: 0 30px 60px rgba(13,13,13,0.20);
        --shadow-faq:    0 2px 8px rgba(107, 53, 200, 0.04);
        --nav-h: 76px;
        --serif: 'Lora', Georgia, serif;
        --sans:  'Mulish', sans-serif;
        --radius:    4px;
        --radius-lg: 12px;
        --gold-pale:  #F5F0FF;
        --green:      #6B35C8;
        --gold-light: #E8772A;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: var(--sans); color: var(--ink); background: var(--paper); line-height: 1.75; overflow-x: hidden; }

    /* Animacje reveal - ukrywamy tylko gdy JS jest włączony i strona załadowana */
    .js-loaded .reveal { 
        opacity: 0; 
        transform: translateY(32px); 
        transition: opacity 0.8s cubic-bezier(0.22,1,0.36,1), transform 0.8s cubic-bezier(0.22,1,0.36,1); 
    }
    .js-loaded .reveal.active { opacity: 1; transform: none; }
    
    .reveal.delay-1 { transition-delay: 0.1s; }
    .reveal.delay-2 { transition-delay: 0.2s; }
    .reveal.delay-3 { transition-delay: 0.3s; }
    .reveal.delay-4 { transition-delay: 0.4s; }

    /* ── NAWIGACJA ── */
    .nav { position: fixed; top: 0; left: 0; width: 100%; z-index: 1000; height: var(--nav-h); background: transparent; display: flex; align-items: center; transition: background 0.3s ease, backdrop-filter 0.3s ease; }
    .nav.scrolled { background: rgba(13,13,13,0.92); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); }
    .nav-inner { width: 100%; max-width: 1180px; margin: 0 auto; padding: 0 40px; display: flex; align-items: center; justify-content: space-between; }
    .nav-logo { font-family: var(--serif); font-size: 1.35rem; font-weight: 700; color: #fff; text-decoration: none; display: flex; align-items: baseline; gap: 0.2em; position: relative; z-index: 902; }
    .nav-logo em { font-style: italic; color: var(--grad-start); font-weight: inherit; }
    .nav-links { display: flex; gap: 32px; list-style: none; }
    .nav-links a { font-family: var(--sans); font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.12em; color: rgba(255,255,255,0.75); text-decoration: none; transition: color 0.2s; }
    .nav-links a:hover, .nav-links a.active { color: #fff; }
    .nav-right { display: flex; align-items: center; gap: 12px; position: relative; z-index: 902; }
    .nav-cta { font-family: var(--sans); font-size: 0.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: #fff; background: var(--grad); text-decoration: none; padding: 10px 22px; border-radius: 100px; transition: opacity 0.2s, transform 0.2s; }
    .nav-cta:hover { opacity: 0.85; transform: translateY(-1px); }

    .mobile-toggle { display: none; background: none; border: none; font-size: 1.8rem; color: #fff; cursor: pointer; padding: 4px; transition: color 0.2s; }
    .mobile-toggle:hover { color: var(--grad-start); }

    /* ── SEKCJE ── */
    .container { max-width: 1180px; margin: 0 auto; padding: 0 40px; }
    .section { padding: 110px 0; }
    .bg-white { background: var(--paper); }
    .bg-warm { background: var(--paper-warm); }
    .tiles-section { background: var(--paper-warm); }

    .hero { position: relative; min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; text-align: center; background: var(--ink); }
    .hero-bg { position: absolute; inset: 0; z-index: 0; }
    .hero-bg img { width: 100%; height: 100%; object-fit: cover; display: block; opacity: 0.5; }
    .hero-bg::after { content: ''; position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(10,8,18,0.7) 0%, rgba(10,8,18,0.4) 100%); }
    
    .hero-content { position: relative; z-index: 2; padding: 0 40px; width: 100%; max-width: 900px; display: flex; flex-direction: column; align-items: center; }

    .section-h2 { font-family: var(--serif); font-size: clamp(2rem, 3vw, 2.8rem); font-weight: 700; line-height: 1.2; color: var(--ink); margin-bottom: 20px; }
    .section-h2 em { font-style: italic; background: var(--grad-text); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; padding: 3px 4px 3px 6px; display: inline-block; }
    
    .grad-type { font-style: italic; font-weight: 700; background: var(--grad-text); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; display: inline-block; padding-right: 8px; padding-bottom: 15px; margin-bottom: -15px; }
    .cursor { display: inline-block; width: 3px; height: 1em; background-color: #FFFFFF; vertical-align: middle; margin-left: 5px; animation: blink 1s step-end infinite; }
    @keyframes blink { 50% { opacity: 0; } }

    /* ── BLOG CARDS ── */
    .blog-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 30px; margin-top: 40px; }
    .blog-card { background: #fff; border: 1.5px solid var(--paper-mid); border-radius: var(--radius-lg); overflow: hidden; box-shadow: var(--shadow-soft); display: flex; flex-direction: column; transition: transform 0.3s, box-shadow 0.3s; text-decoration: none; }
    .blog-card:hover { transform: translateY(-6px); box-shadow: var(--shadow-med); }
    .blog-img { width: 100%; aspect-ratio: 16/10; overflow: hidden; }
    .blog-img img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s ease; }
    .blog-info { padding: 32px 28px; }
    .blog-title { font-family: var(--serif); font-size: 1.25rem; font-weight: 700; color: var(--ink); margin-bottom: 12px; }
    .blog-excerpt { font-family: var(--sans); font-size: 0.95rem; color: var(--ink-soft); margin-bottom: 24px; font-weight: 300; }
    .blog-readmore { font-weight: 700; text-transform: uppercase; font-size: 0.8rem; color: var(--grad-start); display: flex; align-items: center; gap: 8px; }

    /* ── FOOTER ── */
    .grad-line-footer { height: 3px; background: var(--grad); }
    footer { background: #0D0D0D; color: #fff; padding: 56px 0 32px; }
    .footer-container { max-width: 1180px; margin: 0 auto; padding: 0 40px; width: 100%; }
    .footer-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 60px; padding-bottom: 40px; border-bottom: 1px solid rgba(255,255,255,0.08); margin-bottom: 28px; }
    .footer-logo { font-family: var(--serif); font-size: 1.4rem; font-weight: 700; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
    .footer-logo .footer-grad { background: var(--grad-text); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; display: inline-block; font-style: normal; }
    .footer-links { list-style: none; padding: 0; margin: 0; }
    .footer-links a { color: rgba(255,255,255,0.5); text-decoration: none; font-size: 0.88rem; transition: color 0.2s; }
    .footer-links a:hover { color: #fff; }
    .footer-bottom { display: flex; justify-content: space-between; font-size: 0.78rem; color: rgba(255,255,255,0.25); }

    /* ── RESPONSIVE ── */
    @media (max-width: 1024px) { .blog-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 860px) {
        .nav-links { display: none; }
        .mobile-toggle { display: block; }
        .footer-grid { grid-template-columns: 1fr; }
        .blog-grid { grid-template-columns: 1fr; }
    }
</style>
