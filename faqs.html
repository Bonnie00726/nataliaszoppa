---
layout: default
title: FAQs
---
<style>
    /* ===== WYMUSZENIE CZARNEGO MENU NA TEJ PODSTRONIE ===== */
    .nav {
        background: rgba(13,13,13,0.98) !important;
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
    }

    /* ===== SEKCJA TYTUŁOWA ===== */
    .page-header { 
        padding: calc(var(--nav-h) + 60px) 40px 40px; 
        max-width: 1000px; 
        margin: 0 auto; 
        text-align: center; 
    }
    
    .breadcrumbs { 
        display: flex; 
        align-items: center; 
        justify-content: center; 
        gap: 12px; 
        font-family: var(--sans); 
        font-size: 0.72rem; 
        font-weight: 700; 
        text-transform: uppercase; 
        letter-spacing: 0.15em; 
        margin-bottom: 24px; 
        flex-wrap: wrap; 
    }
    
    .breadcrumbs a { color: var(--ink-muted); text-decoration: none; transition: color 0.2s; }
    .breadcrumbs a:hover { color: var(--grad-start); }
    .breadcrumbs i { color: var(--paper-mid); font-size: 0.9rem; }
    .breadcrumbs .current { color: var(--grad-start); }
    
    .page-title { 
        font-family: var(--serif); 
        font-size: clamp(2.2rem, 4vw, 3.5rem); 
        color: var(--ink); 
        line-height: 1.15; 
        margin-bottom: 16px; 
    }
    
    .page-subtitle {
        font-family: var(--sans); 
        font-size: 1.05rem; 
        color: var(--ink-soft); 
        font-weight: 300; 
        max-width: 600px; 
        line-height: 1.6; 
        margin: 0 auto; 
    }

    /* ===== OBRAZEK HERO ===== */
    .page-hero-img-wrap { width: 100%; }
    .page-hero-img { 
        width: 100%; 
        height: 50vh; 
        min-height: 400px; 
        max-height: 600px;
        object-fit: cover; 
        display: block; 
    }

    /* ===== CREDIBILITY BAR ===== */
    .credibility-bar-overlap { 
        background: var(--ink); 
        padding: 22px 40px; 
        position: relative; 
        z-index: 10; 
        margin-top: -30px; 
        max-width: 1100px; 
        margin-left: auto; 
        margin-right: auto; 
        border-radius: var(--radius-lg); 
        box-shadow: var(--shadow-strong); 
        width: calc(100% - 40px); 
    }
    .credibility-bar-inner { display: flex; align-items: center; justify-content: center; gap: 32px; flex-wrap: wrap; }
    .cred-pillar { display: flex; align-items: center; gap: 12px; }
    .cred-pillar i { font-size: 1.6rem; background: var(--grad-text); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; flex-shrink: 0; }
    .cred-pillar span { font-family: var(--sans); font-size: 0.82rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; color: rgba(255,255,255,0.9); }

    /* ===== GŁÓWNY KONTENER TREŚCI ===== */
    .page-content-wrapper { 
        max-width: 800px; 
        margin: 60px auto 100px; 
        padding: 0 24px; 
    }

    /* ===== AKORDEONY FAQ ===== */
    .faq-group { margin-bottom: 60px; scroll-margin-top: 150px; }
    .faq-group-title { font-family: var(--serif); font-size: 1.6rem; font-weight: 700; color: var(--ink); margin-bottom: 28px; padding-bottom: 12px; border-bottom: 2px solid var(--paper-mid); display: flex; align-items: center; gap: 14px; }
    .faq-group-title i { color: var(--grad-start); font-size: 1.8rem; }
    
    .accordion-item {
        background: #fff;
        border: 1.5px solid var(--paper-mid);
        border-radius: var(--radius-lg);
        margin-bottom: 18px;
        overflow: hidden;
        transition: all 0.3s ease;
        box-shadow: 0 2px 8px rgba(107, 53, 200, 0.04);
    }
    
    .accordion-item:hover:not(.open) {
        border-color: rgba(107, 53, 200, 0.2);
        box-shadow: 0 4px 12px rgba(107, 53, 200, 0.06);
        transform: translateY(-1px);
    }
    
    .accordion-item.open {
        border-color: var(--grad-start);
        box-shadow: 0 4px 24px rgba(13,13,13,0.06);
    }
    
    .accordion-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 26px 36px;
        cursor: pointer;
        user-select: none;
        background: #fff;
        transition: background 0.2s;
    }
    
    .accordion-header:hover .accordion-question { color: var(--grad-start); }
    
    .accordion-question {
        font-family: var(--sans);
        font-size: 1.15rem;
        font-weight: 600;
        color: var(--ink);
        transition: color 0.2s;
        padding-right: 24px;
        line-height: 1.4;
    }
    
    .accordion-item.open .accordion-question {
        color: var(--grad-start);
        font-weight: 700;
    }
    
    .accordion-icon {
        width: 38px;
        height: 38px;
        position: relative;
        flex-shrink: 0;
        background: var(--grad-text);
        border-radius: 50%;
        transition: transform 0.3s ease, box-shadow 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    
    .accordion-header:hover .accordion-icon { box-shadow: 0 0 0 5px rgba(107, 53, 200, 0.1); }
    
    .accordion-icon::before, .accordion-icon::after {
        content: '';
        position: absolute;
        background: #fff;
        transition: transform 0.3s ease-out;
        border-radius: 4px;
    }
    
    .accordion-icon::before { top: 18px; left: 10px; width: 18px; height: 3px; }
    .accordion-icon::after { top: 10px; left: 18px; width: 3px; height: 18px; }
    
    .accordion-item.open .accordion-icon { transform: rotate(135deg); }
    
    .accordion-body {
        max-height: 0;
        overflow: hidden;
        transition: max-height 0.4s cubic-bezier(0.22, 1, 0.36, 1), padding 0.4s ease;
        background: var(--paper-warm);
    }
    
    .accordion-body.open {
        max-height: 1500px;
        padding: 10px 36px 36px 36px;
        border-top: 1px solid rgba(107, 53, 200, 0.1);
    }
    
    .accordion-body p { font-size: 1.05rem; color: var(--ink-soft); line-height: 1.8; margin-bottom: 18px; }
    .accordion-body p:last-child { margin-bottom: 0; }
    .accordion-body strong { color: var(--ink); font-weight: 700; }
    .accordion-body a { color: var(--grad-start); font-weight: 600; text-decoration: underline; text-underline-offset: 3px; transition: opacity 0.2s; }
    .accordion-body a:hover { opacity: 0.8; }

    /* ===== CTA ===== */
    .cta-section { padding: 120px 40px; text-align: center; position: relative; overflow: hidden; background-image: url('https://images.unsplash.com/photo-1586806974856-c55e8b9364e4?q=80&w=1170&auto=format&fit=crop'); background-size: cover; background-position: center; }
    .cta-section::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, rgba(107, 53, 200, 0.9) 0%, rgba(184, 64, 154, 0.9) 50%, rgba(232, 119, 42, 0.9) 100%); z-index: 1; }
    .cta-content { position: relative; z-index: 2; }
    .cta-section .eyebrow { display: block; font-family: var(--sans); font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.18em; margin-bottom: 12px; color: rgba(255,255,255,0.8); }
    .cta-section h2 { font-family: var(--serif); font-size: clamp(2rem, 3.5vw, 3rem); color: #fff; font-weight: 700; margin-bottom: 16px; }
    .cta-section p { color: rgba(255,255,255,0.9); font-weight: 300; font-size: 1.05rem; max-width: 520px; margin: 0 auto 40px; line-height: 1.6; }
    .cta-btns { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
    .btn-cta-white { display: inline-flex; align-items: center; gap: 10px; background: #fff; color: var(--ink); font-size: 0.85rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; text-decoration: none; padding: 15px 32px; border-radius: 100px; transition: transform 0.2s, box-shadow 0.2s; }
    .btn-cta-white:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(0,0,0,0.2); }
    .btn-ghost { display: inline-flex; align-items: center; gap: 8px; color: #fff; font-size: 0.85rem; font-weight: 600; text-decoration: none; padding: 14px 28px; border: 1.5px solid rgba(255,255,255,0.4); border-radius: 100px; transition: background 0.2s, border-color 0.2s; background: transparent; }
    .btn-ghost:hover { background: rgba(255,255,255,0.1); border-color: #fff; }

    /* RWD */
    @media (max-width: 860px) { 
        .page-header { padding: calc(var(--nav-h) + 40px) 20px 30px; }
        .page-title { font-size: 2.2rem; }
        .page-hero-img { min-height: 250px; height: 35vh; }
        .credibility-bar-overlap { margin-top: -20px; padding: 16px 20px; }
        .credibility-bar-inner { gap: 24px; }
        .page-content-wrapper { margin-top: 40px; padding: 0 20px; }
        .accordion-header { padding: 22px 28px; } 
        .accordion-body.open { padding: 0 28px 30px 28px; } 
    }
    @media (max-width: 600px) { 
        .faq-group-title { font-size: 1.4rem; } 
        .accordion-question { font-size: 1.05rem; padding-right: 15px; } 
        .accordion-icon { width: 32px; height: 32px; }
        .accordion-icon::before { top: 15px; left: 8px; width: 16px; height: 2px; }
        .accordion-icon::after { top: 8px; left: 15px; width: 2px; height: 16px; }
    }
</style>
