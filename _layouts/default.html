<!DOCTYPE html>
<html lang="pl">
<head>
    {% include head.html %}
</head>
<body>

    {% include nav.html %}

    {{ content }}

    {% include footer.html %}

    <script>
        // 1. OBSŁUGA MODALI (Okienka z pakietami)
        document.addEventListener('DOMContentLoaded', () => {
            const readMoreBtns = document.querySelectorAll('.read-more-btn');
            const closeBtns = document.querySelectorAll('.close-btn');
            const modals = document.querySelectorAll('.modal');
            
            readMoreBtns.forEach(btn => { 
                btn.addEventListener('click', () => { 
                    const targetId = btn.getAttribute('data-target'); 
                    const modal = document.getElementById(targetId); 
                    if(modal) { 
                        modal.classList.add('show'); 
                        document.body.style.overflow = 'hidden'; 
                    } 
                }); 
            });
            
            closeBtns.forEach(btn => { 
                btn.addEventListener('click', () => { 
                    btn.closest('.modal').classList.remove('show'); 
                    document.body.style.overflow = ''; 
                }); 
            });
            
            modals.forEach(modal => { 
                modal.addEventListener('click', (e) => { 
                    if (e.target === modal) { 
                        modal.classList.remove('show'); 
                        document.body.style.overflow = ''; 
                    } 
                }); 
            });
        });
        
        // 2. ANIMACJE POJAWIANIA SIĘ (Scroll Reveal)
        if (window.innerWidth > 860) document.documentElement.classList.add('js-loaded');
        var revealAll = function() { document.querySelectorAll('.reveal').forEach(function(el) { el.classList.add('active'); }); };
        if ('IntersectionObserver' in window && window.innerWidth > 860) {
            var io = new IntersectionObserver(function(entries) { 
                entries.forEach(function(e) { 
                    if (e.isIntersecting) { 
                        e.target.classList.add('active'); 
                        io.unobserve(e.target); 
                    } 
                }); 
            }, { threshold: 0.05, rootMargin: '0px 0px -40px 0px' });
            document.querySelectorAll('.reveal').forEach(function(el) { io.observe(el); });
        } else revealAll();

        // 3. PRZYKLEJONE MENU (Sticky Nav z cieniem)
        (function() {
            var nav = document.getElementById('main-nav') || document.querySelector('.nav');
            if (!nav) return;
            if (!document.querySelector('.hero')) nav.classList.add('scrolled');
            window.addEventListener('scroll', function() {
                if (document.querySelector('.hero')) { 
                    if (window.scrollY > 50) nav.classList.add('scrolled'); 
                    else nav.classList.remove('scrolled'); 
                }
            });
        })();

        // 4. MENU MOBILNE
        var mobileToggle = document.querySelector('.mobile-toggle');
        var navLinks = document.querySelector('.nav-links');
        if (mobileToggle && navLinks) {
            mobileToggle.addEventListener('click', function() {
                var isExpanded = mobileToggle.getAttribute('aria-expanded') === 'true';
                mobileToggle.setAttribute('aria-expanded', !isExpanded);
                navLinks.classList.toggle('nav-open');
                var toggleIcon = mobileToggle.querySelector('i');
                if (toggleIcon) { 
                    if (navLinks.classList.contains('nav-open')) toggleIcon.classList.replace('la-bars', 'la-times'); 
                    else toggleIcon.classList.replace('la-times', 'la-bars'); 
                }
            });
        }

        // 5. AKORDIONY (np. do FAQ)
        document.querySelectorAll('.accordion-header').forEach(function(header) {
            header.addEventListener('click', function() {
                var item = header.closest('.accordion-item');
                if (item) { 
                    var body = item.querySelector('.accordion-body'); 
                    var isOpen = item.classList.contains('open'); 
                    item.classList.toggle('open', !isOpen); 
                    if (body) body.classList.toggle('open', !isOpen); 
                }
            });
        });

        // 6. WYSUWANY SIDEBAR (Na blogu)
        document.addEventListener('DOMContentLoaded', function() {
            var sidebarToggle = document.getElementById('sidebarToggle');
            if (sidebarToggle) {
                sidebarToggle.addEventListener('click', function() {
                    document.body.classList.toggle('sidebar-open');
                    var icon = sidebarToggle.querySelector('i');
                    if(document.body.classList.contains('sidebar-open')) {
                        icon.classList.remove('la-bars');
                        icon.classList.add('la-times');
                    } else {
                        icon.classList.remove('la-times');
                        icon.classList.add('la-bars');
                    }
                });
            }
        });
        
        // 7. ANIMACJA DZWONECZKA (Powiadomienia)
        document.addEventListener('DOMContentLoaded', function() {
            var bellIcon   = document.querySelector('.bell-icon');
            var bellNotice = document.querySelector('.bell-notice');
            var bellPill   = document.querySelector('.bell-pill');
            if (!bellNotice) return;
            setTimeout(function() { bellNotice.classList.add('visible'); }, 200);
            setTimeout(function() { bellIcon.classList.add('ring1'); }, 400);
            setTimeout(function() { bellIcon.classList.remove('ring1'); }, 1200);
            setTimeout(function() { bellIcon.classList.add('ring2'); }, 1300);
            setTimeout(function() { if(bellPill) bellPill.classList.add('expanded'); }, 1700);
        });
    </script>
</body>
</html>
