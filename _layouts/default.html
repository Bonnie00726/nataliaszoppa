<!DOCTYPE html>
<html lang="pl">
<head>
    {% include head.html %}
</head>
<body>

    {% include nav.html %}

    {{ content }}

    {% include footer.html %}

    <script>
        // 1. REVEAL — dodaj js-loaded tylko na desktop (mobilne zawsze widoczne)
        if (window.innerWidth > 860) {
            document.documentElement.classList.add('js-loaded');
        }

        var revealAll = function() {
            document.querySelectorAll('.reveal').forEach(function(el) { el.classList.add('active'); });
        };

        if ('IntersectionObserver' in window && window.innerWidth > 860) {
            var io = new IntersectionObserver(function(entries) {
                entries.forEach(function(e) {
                    if (e.isIntersecting) { e.target.classList.add('active'); io.unobserve(e.target); }
                });
            }, { threshold: 0.05, rootMargin: '0px 0px -40px 0px' });
            document.querySelectorAll('.reveal').forEach(function(el) { io.observe(el); });
        } else {
            revealAll();
        }

        // 2. SCROLLOWANA NAWIGACJA + auto-ciemna na podstronach bez hero
        (function() {
            var nav = document.getElementById('main-nav');
            if (!nav) return;
            // Jeśli strona nie ma sekcji .hero — nav od razu ciemna
            if (!document.querySelector('.hero')) {
                nav.classList.add('scrolled');
            }
            window.addEventListener('scroll', function() {
                if (document.querySelector('.hero')) {
                    if (window.scrollY > 50) { nav.classList.add('scrolled'); }
                    else { nav.classList.remove('scrolled'); }
                }
            });
        })();

        // 3. MENU MOBILNE
        var mobileToggle = document.querySelector('.mobile-toggle');
        var navLinks = document.querySelector('.nav-links');

        if (mobileToggle && navLinks) {
            mobileToggle.addEventListener('click', function() {
                var isExpanded = mobileToggle.getAttribute('aria-expanded') === 'true';
                mobileToggle.setAttribute('aria-expanded', !isExpanded);
                navLinks.classList.toggle('nav-open');
                var toggleIcon = mobileToggle.querySelector('i');
                if (toggleIcon) {
                    if (navLinks.classList.contains('nav-open')) {
                        toggleIcon.classList.replace('la-bars', 'la-times');
                    } else {
                        toggleIcon.classList.replace('la-times', 'la-bars');
                    }
                }
            });
        }

        // 4. MASZYNA DO PISANIA
        document.addEventListener('DOMContentLoaded', function() {
            var words = ["historie", "pomysły", "słowa", "książki", "e-booki"];
            var wordIndex = 0;
            var charIndex = 0;
            var isDeleting = false;
            var typeTarget = document.getElementById('typewriter-word');

            if (typeTarget) {
                function typeEffect() {
                    var currentWord = words[wordIndex];
                    if (isDeleting) { charIndex--; } else { charIndex++; }
                    typeTarget.textContent = currentWord.substring(0, charIndex);
                    var typeSpeed = isDeleting ? 50 : 120;
                    if (!isDeleting && charIndex === currentWord.length) {
                        typeSpeed = 2000; isDeleting = true;
                    } else if (isDeleting && charIndex === 0) {
                        isDeleting = false;
                        wordIndex = (wordIndex + 1) % words.length;
                        typeSpeed = 400;
                    }
                    setTimeout(typeEffect, typeSpeed);
                }
                setTimeout(typeEffect, 600);
            }
        });

        // 5. AKORDEON FAQ
        document.querySelectorAll('.accordion-header').forEach(function(header) {
            header.addEventListener('click', function() {
                var item = header.closest('.accordion-item');
                if (item) {
                    var body = item.querySelector('.accordion-body');
                    var isOpen = item.classList.contains('open');
                    item.classList.toggle('open', !isOpen);
                    if (body) body.classList.toggle('open', !isOpen);
                }
            });
        });
    </script>
</body>
</html>
